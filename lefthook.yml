commit-msg:
  commands:
    commitlint:
      run: pnpm commitlint --edit {1}

pre-commit:
  commands:
    lint:
      glob: '*.{js,ts,cjs,mjs,d.cts,d.mts,jsx,tsx,vue,json,jsonc}'
      run: pnpm lint --fix
      stage_fixed: true

pre-push:
  commands:
    lint:
      glob: '*.{js,ts,cjs,mjs,d.cts,d.mts,jsx,tsx,vue,json,jsonc}'
      run: pnpm lint

